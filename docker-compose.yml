services:
  postgres:
    image: postgres:16
    container_name: engineeringos-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: engineeringos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: engineeringos

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: engineeringos-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: